<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader Board — Beachside Racetrack</title>
    <link rel="stylesheet" href="/dist/output.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
        }

        .timer-font {
            font-family: 'JetBrains Mono', monospace;
        }

        #leaderboard-body {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .leaderboard-row {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            flex: 1;
            min-height: 0;
        }
    </style>
</head>

<body class="text-white overflow-hidden p-2 h-screen flex flex-col">
    <header class="flex flex-col lg:flex-row items-center justify-between mb-2 gap-8 text-center lg:text-left">
        <div class="flex flex-col md:flex-row items-center gap-4 md:gap-8">
            <h1
                class="text-4xl md:text-6xl font-black tracking-tighter italic bg-gradient-to-r from-indigo-500 to-emerald-400 bg-clip-text text-transparent underline decoration-indigo-500/30 pr-4">
                LEADERBOARD</h1>
            <div id="flag-display"
                class="px-6 py-2 md:px-8 md:py-3 rounded-2xl text-lg md:text-2xl font-black uppercase tracking-[0.2em] shadow-2xl border-2 border-white/10 transition-all duration-700">
                SAFE</div>
        </div>
        <div class="flex items-center gap-6 md:gap-10">
            <div class="text-center lg:text-right">
                <div class="text-slate-500 font-black text-[10px] md:text-xs tracking-widest uppercase mb-1">TIME
                    REMAINING</div>
                <div id="timer" class="timer-font text-4xl md:text-6xl font-black tracking-tight text-white">00:00.0
                </div>
            </div>
            <button
                class="w-12 h-12 md:w-16 md:h-16 bg-white/5 hover:bg-white/10 rounded-2xl flex items-center justify-center transition-all group"
                onclick="maximizeControl()">
                <svg width="20" height="20" md:width="24" md:height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" class="group-hover:scale-110 transition-transform">
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <polyline points="9 21 3 21 3 15"></polyline>
                    <line x1="21" y1="3" x2="14" y2="10"></line>
                    <line x1="3" y1="21" x2="10" y2="14"></line>
                </svg>
            </button>
        </div>
    </header>

    <main
        class="flex-1 bg-slate-900/50 backdrop-blur-2xl rounded-[3rem] border border-white/5 overflow-hidden flex flex-col shadow-inner">
        <!-- Table Header -->
        <div
            class="grid grid-cols-12 px-6 md:px-12 py-6 md:py-1 border-b border-white/10 bg-slate-950/50 text-indigo-400 font-black tracking-widest text-[10px] md:text-sm uppercase">
            <div class="col-span-2 md:col-span-1">Pos</div>
            <div class="hidden md:block md:col-span-1">Car</div>
            <div class="col-span-6 md:col-span-5">Driver</div>
            <div class="col-span-2 text-right">Laps</div>
            <div class="col-span-2 md:col-span-3 text-right">Best</div>
        </div>

        <div id="leaderboard-body" class="flex-1 overflow-y-auto custom-scrollbar relative">
            <!-- Dynamic Content -->
        </div>
    </main>

    <footer class="mt-1 flex flex-col md:flex-row justify-between items-center px-4 gap-4">
        <div id="session-info" class="text-slate-500 font-bold uppercase tracking-widest text-xs md:text-sm">NO ACTIVE
            SESSION</div>
        <div class="text-slate-600 font-medium text-[10px] md:text-base">B E A C H S I D E &nbsp; R A C E T R A C K
        </div>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/socket-client.js"></script>
    <script>
        let timerInterval = null;

        const CAR_SVG = (colorClass) => `
            <svg viewBox="0 0 24 24" fill="none" class="w-6 h-6 md:w-10 md:h-10 ${colorClass}" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-1.1 0-2 .9-2 2v4c0 1.1.9 2 2 2h2" />
                <circle cx="7" cy="17" r="2" />
                <path d="M9 17h6" />
                <circle cx="17" cy="17" r="2" />
            </svg>
        `;

        const CAR_COLORS = { 1: 'text-red-500', 2: 'text-blue-500', 3: 'text-green-500', 4: 'text-yellow-500', 5: 'text-purple-500', 6: 'text-orange-500', 7: 'text-pink-500', 8: 'text-cyan-500' };
        const CAR_BG_COLORS = { 1: 'bg-red-500/10', 2: 'bg-blue-500/10', 3: 'bg-green-500/10', 4: 'bg-yellow-500/10', 5: 'bg-purple-500/10', 6: 'bg-orange-500/10', 7: 'bg-pink-500/10', 8: 'bg-cyan-500/10' };

        Racetrack.initPublic((state) => {
            updateLeaderboard(state);
            updateStatus(state);
            updateTimer(state);
        });

        function updateLeaderboard(state) {
            const body = document.getElementById('leaderboard-body');
            const sessionInfo = document.getElementById('session-info');

            const displayLeaderboard = state.currentSession ? state.leaderboard : state.lastLeaderboard;
            const displaySession = state.currentSession || state.lastSession;

            if (!displaySession || displayLeaderboard.length === 0) {
                body.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center space-y-6">
                        <div class="text-6xl md:text-8xl animate-bounce">🏎️</div>
                        <div class="text-xl md:text-3xl font-black text-slate-700 tracking-tighter uppercase">Waiting for green flag</div>
                    </div>
                `;
                sessionInfo.innerText = "NO ACTIVE SESSION";
                return;
            }

            sessionInfo.innerText = `${displaySession.name} ${state.currentSession ? '(IN PROGRESS)' : '(RESULTS)'}`;

            body.innerHTML = displayLeaderboard.map((entry, index) => `
            	<div class="leaderboard-row grid grid-cols-12 px-6 md:px-12 border-b border-white/5 items-center hover:bg-white/[0.02]">
                    <div class="col-span-2 md:col-span-1 text-2xl md:text-5xl font-black italic text-slate-700">#${index + 1}</div>
                    <div class="hidden md:block md:col-span-1">
                        <div class="w-16 h-16 ${CAR_BG_COLORS[entry.car_number]} rounded-2xl flex items-center justify-center shadow-2xl border-2 border-white/10">
                            ${CAR_SVG(CAR_COLORS[entry.car_number])}
                        </div>
                    </div>
                    <div class="col-span-6 md:col-span-5 md:px-6">
                        <div class="text-xl md:text-4xl font-black tracking-tight truncate">${entry.driver_name}</div>
                        <div class="text-indigo-500 font-bold text-[8px] md:text-xs tracking-widest mt-1 uppercase">CAR UNIT NO. 00${entry.car_number}</div>
                    </div>
                    <div class="col-span-2 text-right">
                        <div class="text-xl md:text-4xl font-black timer-font text-slate-300">${entry.laps}</div>
                        <div class="hidden md:block text-[10px] font-black text-slate-600 tracking-widest mt-1 uppercase">LAPS</div>
                    </div>
                    <div class="col-span-2 md:col-span-3 text-right">
                        <div class="text-xl md:text-5xl font-black timer-font text-emerald-400">
                            ${entry.fastest_lap_ms ? formatTimeBrief(entry.fastest_lap_ms) : '--:--.-'}
                        </div>
                        <div class="hidden md:block text-[10px] font-black text-slate-600 tracking-widest mt-1 uppercase">FASTEST</div>
                    </div>
                </div>
            `).join('');
        }

        function updateStatus(state) {
            const flag = document.getElementById('flag-display');
            const modes = {
                'safe': { text: 'SAFE', class: 'bg-emerald-500 text-white border-emerald-400/50 shadow-emerald-500/20' },
                'hazard': { text: 'HAZARD', class: 'bg-amber-400 text-black border-amber-300/50 shadow-amber-500/20' },
                'danger': { text: 'DANGER', class: 'bg-red-600 text-white border-red-500/50 shadow-red-500/20' },
                'finish': { text: 'FINISH', class: 'bg-white text-black border-slate-200 shadow-white/50' },
                'idle': { text: 'IDLE', class: 'bg-slate-800 text-slate-400 border-white/5' }
            };
            const config = modes[state.raceState.mode] || modes.idle;
            flag.innerText = config.text;
            flag.className = `px-8 py-3 rounded-2xl text-2xl font-black uppercase tracking-[0.2em] shadow-2xl border-2 transition-all duration-700 ${config.class}`;
        }

        function updateTimer(state) {
            clearInterval(timerInterval);
            const display = document.getElementById('timer');

            if (state.currentSession && state.timerRemaining > 0 && state.raceState.mode !== 'finish' && state.raceState.mode !== 'idle') {
                let local = state.timerRemaining;
                display.innerText = formatTimeSmall(local);
                timerInterval = setInterval(() => {
                    local -= 100;
                    if (local <= 0) {
                        display.innerText = "00:00.0";
                        clearInterval(timerInterval);
                    } else {
                        display.innerText = formatTimeSmall(local);
                    }
                }, 100);
            } else {
                display.innerText = state.timerRemaining <= 0 ? "00:00.0" : formatTimeSmall(state.timerRemaining);
            }
        }

        function formatTime(ms) {
            const m = Math.floor(ms / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            const l = Math.floor((ms % 1000));
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${l.toString().padStart(3, '0')}`;
        }

        function formatTimeSmall(ms) {
            const m = Math.floor(ms / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            const ds = Math.floor((ms % 1000) / 100);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${ds}`;
        }
        function formatTimeBrief(ms) {
            const m = Math.floor(ms / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            const ds = Math.floor((ms % 1000) / 100);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${ds}`;
        }

        window.maximizeControl = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => alert(`Error: ${err.message}`));
            } else {
                document.exitFullscreen();
            }
        };
    </script>
</body>

</html>

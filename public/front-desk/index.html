<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Desk — Beachside Racetrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .bg-dark {
            background-color: #020617;
        }

        .bg-card {
            background-color: #0f172a;
        }
    </style>
</head>

<body class="bg-dark text-slate-100 min-h-screen">
    <!-- Auth Overlay -->
    <div id="auth-overlay"
        class="fixed inset-0 bg-slate-950/98 backdrop-blur-xl flex items-center justify-center z-[1000] transition-opacity duration-500">
        <div class="bg-card p-10 rounded-2xl w-full max-w-md shadow-2xl border border-white/5 text-center">
            <h2
                class="text-2xl font-black mb-8 tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                Front Desk Access</h2>
            <input type="password" id="auth-input" placeholder="••••••••"
                class="w-full px-6 py-4 bg-slate-950 border border-white/10 rounded-xl text-white mb-6 text-center text-xl tracking-widest outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all">
            <button id="auth-button"
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-50 hover:-translate-y-0.5 text-white font-bold rounded-xl transition-all shadow-lg shadow-indigo-600/20">Unlock
                Dashboard</button>
            <div id="auth-error" class="text-red-400 mt-6 text-sm font-medium min-h-[1.25rem]"></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-8 mb-16">
            <div>
                <h1 class="text-4xl font-black tracking-tighter">Front Desk</h1>
                <p class="text-slate-400 mt-2 font-medium">Receptionist Portal — Race Session Management</p>
            </div>
            <button
                class="inline-flex items-center gap-3 px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all shadow-xl shadow-indigo-600/20 active:scale-95"
                onclick="Racetrack.emit('session:create')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Race Session
            </button>
        </header>

        <main id="sessions-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="col-span-full py-20 text-center bg-white/5 border-2 border-dashed border-white/5 rounded-3xl">
                <p class="text-slate-400 font-medium">Loading sessions...</p>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/socket-client.js"></script>
    <script src="/front-desk/script.js"></script>
</body>

</html>

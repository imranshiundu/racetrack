<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lap Tracker — Beachside Racetrack</title>
    <link rel="stylesheet" href="/dist/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .bg-dark {
            background-color: #020617;
        }

        .bg-card {
            background-color: #0f172a;
        }
    </style>
</head>

<body class="bg-dark text-slate-100 h-screen overflow-hidden flex flex-col p-6">
    <!-- Auth Overlay -->
    <div id="auth-overlay"
        class="fixed inset-0 bg-slate-950/98 backdrop-blur-xl flex items-center justify-center z-[1000] transition-opacity duration-500">
        <div class="bg-card p-10 rounded-2xl w-full max-w-md shadow-2xl border border-white/5 text-center">
            <h2
                class="text-2xl font-black mb-8 tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                Lap Tracker Access</h2>
            <input type="password" id="auth-input" placeholder="••••••••"
                class="w-full px-6 py-4 bg-slate-950 border border-white/10 rounded-xl text-white mb-6 text-center text-xl tracking-widest outline-none focus:border-indigo-500 transition-all">
            <button id="auth-button"
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-50 text-white font-bold rounded-xl transition-all shadow-lg shadow-indigo-600/20">Unlock
                Tracker</button>
            <div id="auth-error" class="text-red-400 mt-6 text-sm font-medium min-h-[1.25rem]"></div>
        </div>
    </div>

    <header class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-black tracking-tighter">Lap Tracker</h1>
            <p id="race-name" class="text-indigo-400 font-bold tracking-widest uppercase text-sm mt-1"></p>
        </div>
        <div id="flag-status"
            class="w-16 h-16 rounded-2xl border-4 border-transparent shadow-xl transition-all duration-500"></div>
    </header>

    <main class="relative flex-1">
        <!-- Track Closed Overlay -->
        <div id="end-overlay"
            class="absolute inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center text-center p-10 transition-all duration-500 hidden">
            <div class="max-w-md">
                <div class="text-7xl mb-8">🏁</div>
                <h2 class="text-4xl font-black mb-4 tracking-tighter">TRACK CLOSED</h2>
                <p class="text-slate-400 text-lg font-medium leading-relaxed">The Safety Official has not started a
                    session yet or the track is currently being cleared.</p>
            </div>
        </div>

        <div id="tracker-grid" class="grid grid-cols-2 md:grid-cols-4 grid-rows-4 md:grid-rows-2 gap-3 h-full">
            <button
                class="car-btn group relative bg-slate-900 border border-white/5 rounded-[2.5rem] flex flex-col items-center justify-center transition-all active:scale-95 disabled:opacity-20 disabled:cursor-default overflow-hidden"
                id="btn-1" onclick="recordLap(1)">
                <div
                    class="car-pill absolute top-4 left-1/2 -translate-x-1/2 px-3 py-1 bg-red-500/10 text-red-400 text-[0.625rem] font-black tracking-widest rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                    CAR 1</div>
                <div class="avatar-container mb-2"></div>
                <span
                    class="text-8xl md:text-9xl font-black text-white/10 group-active:text-white transition-colors">1</span>
                <span id="name-1"
                    class="absolute bottom-10 text-xl font-bold text-slate-400 group-active:text-white">-</span>
            </button>
            <button
                class="car-btn group relative bg-slate-900 border border-white/5 rounded-[2.5rem] flex flex-col items-center justify-center transition-all active:scale-95 disabled:opacity-20 disabled:cursor-default overflow-hidden"
                id="btn-2" onclick="recordLap(2)">
                <div
                    class="car-pill absolute top-4 left-1/2 -translate-x-1/2 px-3 py-1 bg-red-500/10 text-red-400 text-[0.625rem] font-black tracking-widest rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                    CAR 2</div>
                <div class="avatar-container mb-2"></div>
                <span
                    class="text-8xl md:text-9xl font-black text-white/10 group-active:text-white transition-colors">2</span>
                <span id="name-2"
                    class="absolute bottom-10 text-xl font-bold text-slate-400 group-active:text-white">-</span>
            </button>
            <button

                    CAR 3</div>

                    CAR 4</div>
                <div class="avatar-container mb-2"></div>
                <span
                    class="text-8xl md:text-9xl font-black text-white/10 group-active:text-white transition-colors">4</span>
                <span id="name-4"

            </button>
            <button

                    CAR 5</div>
                <div class="avatar-container mb-2"></div>
                <span
                    class="text-8xl md:text-9xl font-black text-white/10 group-active:text-white transition-colors">5</span>
                <span id="name-5"
                    class="absolute bottom-10 text-xl font-bold text-slate-400 group-active:text-white">-</span>
            </button>
            <button
                class="car-btn group relative bg-slate-900 border border-white/5 rounded-[2.5rem] flex flex-col items-center justify-center transition-all active:scale-95 disabled:opacity-20 disabled:cursor-default overflow-hidden"

                    CAR 6</div>
                <div class="avatar-container mb-2"></div>
                <span
                    class="text-8xl md:text-9xl font-black text-white/10 group-active:text-white transition-colors">6</span>
                <span id="name-6"

            </button>

                class="car-btn group relative bg-slate-900 border border-white/5 rounded-[2.5rem] flex flex-col items-center justify-center transition-all active:scale-95 disabled:opacity-20 disabled:cursor-default overflow-hidden"
                id="btn-7" onclick="recordLap(7)">
                <div
                    class="car-pill absolute top-4 left-1/2 -translate-x-1/2 px-3 py-1 bg-red-500/10 text-red-400 text-[0.625rem] font-black tracking-widest rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                    CAR 7</div>
                <div class="avatar-container mb-2"></div>
                <span

                    class="absolute bottom-10 text-xl font-bold text-slate-400 group-active:text-white">-</span>
            </button>
            <button
                class="car-btn group relative bg-slate-900 border border-white/5 rounded-[2.5rem] flex flex-col items-center justify-center transition-all active:scale-95 disabled:opacity-20 disabled:cursor-default overflow-hidden"

                <div
                    class="car-pill absolute top-4 left-1/2 -translate-x-1/2 px-3 py-1 bg-red-500/10 text-red-400 text-[0.625rem] font-black tracking-widest rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                    CAR 8</div>
                <div class="avatar-container mb-2"></div>
                <span
                    class="text-8xl md:text-9xl font-black text-white/10 group-active:text-white transition-colors">8</span>
                <span id="name-8"
                    class="absolute bottom-10 text-xl font-bold text-slate-400 group-active:text-white">-</span>
            </button>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/socket-client.js"></script>
    <script src="/lap-line-tracker/script.js"></script>
</body>

</html>

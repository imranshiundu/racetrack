<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Control — Beachside Racetrack</title>
    <link rel="stylesheet" href="/dist/output.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .bg-dark {
            background-color: #020617;
        }

        .bg-card {
            background-color: #0f172a;
        }

        .timer-font {
            font-family: 'JetBrains Mono', monospace;
        }

        .flag-finish {
            background-image:
                linear-gradient(45deg, #000 25%, transparent 25%),
                linear-gradient(-45deg, #000 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #000 75%),
                linear-gradient(-45deg, transparent 75%, #000 75%);
            background-size: 32px 32px;
            background-color: white;
        }
    </style>
</head>

<body class="bg-dark text-slate-100 min-h-screen">
    <!-- Auth Overlay -->
    <div id="auth-overlay"
        class="fixed inset-0 bg-slate-950/98 backdrop-blur-xl flex items-center justify-center z-[1000] transition-opacity duration-500">
        <div class="bg-card p-10 rounded-2xl w-full max-w-md shadow-2xl border border-white/5 text-center">
            <h2
                class="text-2xl font-black mb-8 tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                Race Control Access</h2>
            <input type="password" id="auth-input" placeholder="••••••••"
                class="w-full px-6 py-4 bg-slate-950 border border-white/10 rounded-xl text-white mb-6 text-center text-xl tracking-widest outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all">
            <button id="auth-button"
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-50 hover:-translate-y-0.5 text-white font-bold rounded-xl transition-all shadow-lg shadow-indigo-600/20">Unlock
                Controls</button>
            <div id="auth-error" class="text-red-400 mt-6 text-sm font-medium min-h-[1.25rem]"></div>
        </div>
    </div>

    <div class="max-w-[1600px] mx-auto px-6 py-10">
        <header class="flex items-center justify-between gap-8 mb-12">
            <div>
                <h1 class="text-4xl font-black tracking-tighter">Race Control</h1>
                <div id="status-text" class="text-xs font-black tracking-[0.2em] uppercase mt-2"></div>
            </div>
            <button
                class="inline-flex items-center gap-2 px-6 py-3 bg-white/5 hover:bg-white/10 rounded-xl transition-all font-bold group"
                onclick="maximizeControl()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    class="group-hover:scale-110 transition-transform">
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <polyline points="9 21 3 21 3 15"></polyline>
                    <line x1="21" y1="3" x2="14" y2="10"></line>
                    <line x1="3" y1="21" x2="10" y2="14"></line>
                </svg>
                Full Screen
            </button>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Left Side: Timer and Flags -->
            <div class="lg:col-span-8 space-y-8">
                <div
                    class="bg-slate-900 shadow-2xl rounded-[2.5rem] p-4 md:p-16 flex flex-col items-center justify-center border border-white/5 overflow-hidden">
                    <div id="timer-display"
                        class="timer-font text-[14vw] md:text-[10rem] font-black leading-none text-slate-700 tracking-tighter whitespace-nowrap">
                        00:00.0
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <button id="btn-safe"
                        class="group relative aspect-[4/3] rounded-3xl bg-emerald-500 flex flex-col items-center justify-center gap-4 transition-all hover:scale-[1.02] active:scale-95 border-4 border-transparent"
                        onclick="Racetrack.emit('race:mode', {mode:'safe'})">
                        <span class="text-white font-black uppercase tracking-widest text-lg">Safe</span>
                    </button>
                    <button id="btn-hazard"
                        class="group relative aspect-[4/3] rounded-3xl bg-amber-400 flex flex-col items-center justify-center gap-4 transition-all hover:scale-[1.02] active:scale-95 border-4 border-transparent"
                        onclick="Racetrack.emit('race:mode', {mode:'hazard'})">
                        <span class="text-black font-black uppercase tracking-widest text-lg">Hazard</span>
                    </button>
                    <button id="btn-danger"
                        class="group relative aspect-[4/3] rounded-3xl bg-red-600 flex flex-col items-center justify-center gap-4 transition-all hover:scale-[1.02] active:scale-95 border-4 border-transparent"
                        onclick="Racetrack.emit('race:mode', {mode:'danger'})">
                        <span class="text-white font-black uppercase tracking-widest text-lg">Danger</span>
                    </button>
                    <button id="btn-finish"
                        class="group relative aspect-[4/3] rounded-3xl flag-finish flex flex-col items-center justify-center gap-4 transition-all hover:scale-[1.02] active:scale-95 border-4 border-transparent overflow-hidden"
                        onclick="Racetrack.emit('race:mode', {mode:'finish'})">
                        <div class="bg-white px-4 py-1.5 rounded-lg shadow-xl">
                            <span class="text-black font-black uppercase tracking-widest text-lg">Finish</span>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Right Side: Session Info -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-slate-900 border border-white/5 rounded-[2rem] p-8">
                    <div class="text-[0.625rem] font-black tracking-[0.25em] text-slate-500 uppercase mb-4">Current
                        Session</div>
                    <div id="session-title" class="text-3xl font-black mb-2">Waiting...</div>
                    <div id="driver-status" class="text-slate-400 font-medium pb-8 border-b border-white/5"></div>

                    <div id="action-area" class="mt-8">
                        <!-- Contextual Action Button -->
                    </div>
                </div>

                <div id="next-briefing" class="space-y-4">
                    <!-- Next Race Drivers -->
                </div>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/socket-client.js"></script>
    <script src="/race-control/script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Race — Beachside Racetrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
        }

        .grid-bg {
            background-image:
                radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 32px 32px;
        }

        .driver-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body class="text-white grid-bg min-h-screen flex flex-col p-12">
    <header class="mb-12 flex justify-between items-end">
        <div>
            <div id="status-pill"
                class="inline-block px-4 py-1.5 bg-slate-800 text-slate-400 rounded-full text-[10px] font-black tracking-[0.3em] uppercase mb-4 border border-white/5 transition-all">
                STANDING BY</div>
            <h1 class="text-7xl font-black tracking-tighter">NEXT RACE</h1>
        </div>
        <div class="text-right pb-2">
            <h2 id="session-name" class="text-4xl font-extrabold text-indigo-500 tracking-tight italic">--</h2>
        </div>
    </header>

    <main id="drivers-grid" class="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
        <!-- Dynamic Cards -->
    </main>

    <div id="alert-zone" class="mt-12 opacity-0 transition-opacity duration-1000">
        <div
            class="bg-indigo-600 p-8 rounded-[2.5rem] flex items-center justify-between shadow-2xl shadow-indigo-600/40">
            <div class="flex items-center gap-6">
                <div class="text-6xl animate-pulse">📢</div>
                <div>
                    <div class="text-2xl font-black italic tracking-tight">ATTENTION DRIVERS</div>
                    <div class="text-indigo-100 font-medium">Please proceed to the paddock immediately for your
                        briefing.</div>
                </div>
            </div>
            <div class="px-8 py-3 bg-white text-indigo-600 rounded-2xl font-black tracking-widest text-lg">BRIEFING NOW
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/socket-client.js"></script>
    <script>
        const CAR_AVATARS = { 1: '🏎️', 2: '🏎️', 3: '🏎️', 4: '🏎️', 5: '🏎️', 6: '🏎️', 7: '🏎️', 8: '🏎️' };
        const CAR_COLORS = { 1: 'bg-red-500', 2: 'bg-blue-500', 3: 'bg-green-500', 4: 'bg-yellow-500', 5: 'bg-purple-500', 6: 'bg-orange-500', 7: 'bg-pink-500', 8: 'bg-cyan-500' };

        Racetrack.init('/public', (state) => {
            const grid = document.getElementById('drivers-grid');
            const sessionName = document.getElementById('session-name');
            const alertZone = document.getElementById('alert-zone');
            const statusPill = document.getElementById('status-pill');

            // Requirement: If race is ended (Danger mode), show current session with "Proceed to Paddock"
            // NextSession logic: 
            // - If race active: show Next session (waiting display)
            // - If race danger/idle: show Next session (briefing display)
            // Spec: "Once the race session is ended... The Next Race screen now displays the current session's drivers [which is now the upcoming one], and displays an extra message to tell them to proceed to the paddock."

            const upcoming = state.nextSession;
            const drivers = state.nextDrivers;

            if (!upcoming || drivers.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center text-slate-700">
                        <div class="text-9xl mb-8 opacity-20">🏁</div>
                        <div class="text-4xl font-black italic tracking-tighter opacity-10">WAITING FOR RECEPTION</div>
                    </div>
                `;
                sessionName.innerText = "--";
                alertZone.classList.add('opacity-0');
                statusPill.innerText = "STANDING BY";
                statusPill.className = "inline-block px-4 py-1.5 bg-slate-800 text-slate-400 rounded-full text-[10px] font-black tracking-[0.3em] uppercase mb-4 border border-white/5 transition-all";
                return;
            }

            sessionName.innerText = upcoming.name;

            // Alert logic based on race state
            // If mode is 'danger' (after race end), show alerting
            if (state.raceState.mode === 'danger') {
                alertZone.classList.remove('opacity-0');
                statusPill.innerText = "BRIEFING IN PROGRESS";
                statusPill.className = "inline-block px-4 py-1.5 bg-indigo-600 text-white rounded-full text-[10px] font-black tracking-[0.3em] uppercase mb-4 transition-all";
            } else {
                alertZone.classList.add('opacity-0');
                statusPill.innerText = "UPCOMING RACE";
                statusPill.className = "inline-block px-4 py-1.5 bg-slate-800 text-slate-400 rounded-full text-[10px] font-black tracking-[0.3em] uppercase mb-4 border border-white/5 transition-all";
            }

            grid.innerHTML = drivers.map(d => `
                <div class="driver-card bg-slate-900 shadow-2xl rounded-[3rem] p-10 border border-white/5 flex flex-col items-center justify-center text-center hover:border-indigo-500/50 hover:-translate-y-2">
                    <div class="w-32 h-32 rounded-[2rem] ${CAR_COLORS[d.car_number]} mb-8 flex items-center justify-center text-6xl shadow-inner border-8 border-white/10">
                        ${CAR_AVATARS[d.car_number]}
                    </div>
                    <div class="text-[10px] font-black tracking-[0.4em] text-slate-500 uppercase mb-3">CAR NO. ${d.car_number}</div>
                    <div class="text-3xl font-black tracking-tight leading-tight">${d.name}</div>
                </div>
            `).join('');
        });
    </script>
</body>

</html>
